services:
  backend:
    build:
      context: ./backend
      target: prod
    image: 2fit-backend:prod
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/twofit
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "FALSE"
    volumes: !reset []

  worker:
    image: 2fit-backend:prod
    pull_policy: never
    command: ["celery", "-A", "app.celery_worker:celery_app", "worker", "--loglevel=info"]
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/twofit
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "FALSE"
    volumes: !reset []

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
        NEXT_PUBLIC_HOST: http://localhost:3000
    image: 2fit-frontend:prod
    environment:
      NODE_ENV: production
      # Next standalone uses HOSTNAME for server.listen(); the container OS sets HOSTNAME to the
      # container id/name and overrides the image ENV, so bind fails unless we force 0.0.0.0.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_HOST: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      API_BASE_URL_INTERNAL: http://backend:5000
    volumes: !reset []
