name: 2fit-webapp

x-backend-build: &backend-build
  context: ./backend
  target: dev

x-backend-env: &backend-env
  HOST: 0.0.0.0
  PORT: 5000
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/twofit
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: http://localhost:3000

x-frontend-build: &frontend-build
  context: ./frontend
  target: dev
  args:
    NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    NEXT_PUBLIC_HOST: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twofit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: *backend-build
    image: 2fit-backend:dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    image: 2fit-backend:dev
    pull_policy: never
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_worker.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./backend/.env
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: *frontend-build
    image: 2fit-frontend:dev
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_HOST: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      API_BASE_URL_INTERNAL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  frontend_next:
  frontend_node_modules:
  postgres_data:
  redis_data:
