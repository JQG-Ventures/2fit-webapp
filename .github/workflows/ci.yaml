name: Full CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'compose.yaml'
              - 'compose.prod.yaml'
              - 'scripts/**'
              - 'README.md'

  backend-quality:
    name: Backend quality
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('backend/requirements-dev.txt', 'backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff lint
        run: ruff check .

      - name: Run mypy strict
        run: mypy app run.py

      - name: Run import-linter
        run: lint-imports --config .importlinter

      - name: Run pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend-quality:
    name: Frontend quality
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Run Next.js build
        run: npm run build

      # Uncomment when frontend tests are written:
      # - name: Run frontend tests with coverage
      #   run: npm run test:coverage
      #   env:
      #     CI: true

  docker-smoke:
    name: Docker smoke stack
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare env files for Docker smoke
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env.local

      - name: Run Docker smoke stack
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml up -d --build
          docker compose -f compose.yaml -f compose.prod.yaml ps
          curl --retry 20 --retry-delay 3 --retry-connrefused http://localhost:5000/
          curl --retry 20 --retry-delay 3 --retry-connrefused http://localhost:3000/

      - name: Tear down Docker smoke stack
        if: always()
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml down -v --remove-orphans
