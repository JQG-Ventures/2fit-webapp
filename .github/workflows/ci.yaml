name: Full CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Needed for dorny/paths-filter on pull_request (compare against base branch).
          fetch-depth: 0
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'compose.yaml'
              - 'compose.prod.yaml'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'README.md'

  backend-quality:
    name: Backend quality
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/twofit_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: twofit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('backend/requirements-dev.txt', 'backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff lint
        run: ruff check .

      - name: Run mypy strict
        run: mypy app run.py

      - name: Run import-linter
        run: lint-imports --config .importlinter

      - name: Run pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend-quality:
    name: Frontend quality
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Run Next.js build
        run: npm run build

      # Uncomment when frontend tests are written:
      # - name: Run frontend tests with coverage
      #   run: npm run test:coverage
      #   env:
      #     CI: true

  docker-smoke:
    name: Docker smoke stack
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare env files for Docker smoke
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env.local

      - name: Run Docker smoke stack
        run: |
          set -euo pipefail
          # --wait: block until healthchecks pass (avoids racing curl on slow pull_request runners).
          # PR workflows checkout a merge commit; first-time image builds + cold cache can exceed push timing.
          docker compose -f compose.yaml -f compose.prod.yaml up -d --build --wait --wait-timeout 600
          docker compose -f compose.yaml -f compose.prod.yaml ps

          # curl --retry-connrefused only retries "connection refused", not "connection reset"
          # (Next standalone can still reset briefly after healthcheck in edge cases).
          wait_http() {
            local url=$1
            local label=$2
            local attempt=0
            local max=60
            while [ "$attempt" -lt "$max" ]; do
              if curl -fsS --max-time 8 "$url" >/dev/null 2>&1; then
                echo "OK: $label ($url)"
                return 0
              fi
              attempt=$((attempt + 1))
              sleep 2
            done
            echo "Timeout waiting for $label"
            docker compose -f compose.yaml -f compose.prod.yaml logs --tail 120 backend || true
            docker compose -f compose.yaml -f compose.prod.yaml logs --tail 120 frontend || true
            return 1
          }

          wait_http http://127.0.0.1:5000/ backend
          wait_http http://127.0.0.1:3000/ frontend

      - name: Tear down Docker smoke stack
        if: always()
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml down -v --remove-orphans
