[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".eggs", ".git", ".hg", ".mypy_cache", ".tox", ".venv", "venv", "env", "_build", "build", "dist", "app/utils/prompts.py"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]
ignore = ["B904", "E501"]

# Stable isort when linting from repo root (`pre-commit`) or from `backend/` (Docker / local cd).
[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
files = ["app", "run.py"]
plugins = ["pydantic.mypy"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_any_generics = true
no_implicit_optional = true
warn_unused_ignores = true
strict_equality = true
warn_return_any = true

[[tool.mypy.overrides]]
module = [
    "azure.*",
    "celery.*",
    "flasgger.*",
    "flask_cors.*",
    "flask_jwt_extended.*",
    "flask_restx.*",
    "flask_sqlalchemy.*",
    "google.*",
    "openai.*",
    "sendgrid.*",
    "sqlalchemy.*",
    "twilio.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/celery.py",
    "app/celery_worker.py",
    "app/tasks/*",
]

[tool.coverage.report]
fail_under = 90
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
]
